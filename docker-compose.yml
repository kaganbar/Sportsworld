services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sportsworld}
      POSTGRES_USER: ${POSTGRES_USER:-sportsworld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportsworld}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportsworld}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  live_ticker:
    build: ./backend
    command: python manage.py run_live_ticker
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  backend-nest:
    build: ./backend-nest
    command: npm run dev
    volumes:
      - ./backend-nest:/app
      - /app/node_modules
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sportsworld}:${POSTGRES_PASSWORD:-sportsworld}@db:5432/sportsworld_nest
      PORT: 8001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend-next:
    build: ./frontend-next
    command: npm run dev -- --hostname 0.0.0.0
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend-nest

volumes:
  pgdata:
